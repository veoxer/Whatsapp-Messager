services:
  whatsapp-api:
    build: .
    image: whatsapp-local-api:latest
    restart: unless-stopped
    init: true
    shm_size: "1gb"
    ports:
      - "127.0.0.1:3030:3030"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3030
      API_KEY: ${API_KEY:?Set API_KEY in your Docker env file to a random value of at least 32 characters}
      REQUIRE_API_KEY: "true"
      AUTH_DATA_PATH: /home/node/.wwebjs_auth
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
      PUPPETEER_HEADLESS: "true"
      CHROME_NO_SANDBOX: "true"
      GENERAL_RATE_LIMIT_MAX: 120
      SEND_RATE_LIMIT_MAX: 20
      RATE_LIMIT_WINDOW_MS: 60000
      MESSAGE_MAX_LENGTH: 4096
      WHATSAPP_TIMEOUT_MS: 30000
      READY_TIMEOUT_MS: 180000
      EXIT_ON_READY_TIMEOUT: "false"
      CLEAN_CHROME_LOCKS_ON_START: "true"
      DEBUG_DIR: /home/node/.cache/whatsapp-api-debug
      DEBUG_SCREENSHOT_ON_READY_TIMEOUT: "true"
      AUTO_DISMISS_POPUPS: "true"
      POPUP_DISMISS_INTERVAL_MS: 15000
    volumes:
      - whatsapp_auth:/home/node/.wwebjs_auth
      - whatsapp_cache:/home/node/.cache
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  whatsapp_auth:
  whatsapp_cache:
